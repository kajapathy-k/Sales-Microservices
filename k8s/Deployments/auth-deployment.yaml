apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: sales-test-ns
  labels:
    app: auth
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-microservice
  template:
    metadata:
      labels:
        app: auth-microservice
    spec:
      containers:
        - name: auth-container
          image: kubectlandchill/sales-auth-service:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config