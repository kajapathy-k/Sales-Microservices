apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-deployment
  namespace: sowrabh-test-ns
  labels:
    app: invoice
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: invoice-microservice
  template:
    metadata:
      labels:
        app: invoice-microservice
    spec:
      containers:
      - name: invoice-container
        image: kubectlandchill/sales-invoice-service:v1.0.0
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: backend_secret
        - configMapRef:
            name: backend-config